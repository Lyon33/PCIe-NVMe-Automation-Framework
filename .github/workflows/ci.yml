name: PCIe-NVMe Automation CI

on:
  push:
    branches: [ main  ]
  pull_request:
    branches: [ main  ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python 3.10
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          sudo apt-get update
          # 安装 lspci 和 fio (PCIe枚举和性能测试必备)
          sudo apt-get install -y pciutils fio

      - name: Run Pytest Unit Tests
        run: |
          pytest tests/ -v --tb=short

      - name: Generate HTML Report (Optional for Demo)
        if: always() # 即使测试失败也生成报告
        run: |
          pip install pytest-html
          pytest tests/ --html=reports/test_report.html --self-contained-html || true

      - name: Upload Test Report
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: test-results
          path: reports/
